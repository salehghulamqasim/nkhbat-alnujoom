<!doctype html>
<html class="dark" lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>نخبة النجوم</title>
    <!--
      FOUC Prevention: This blocking script MUST run before any CSS or module
      scripts are evaluated. It reads the persisted theme/language from
      localStorage and applies the correct class/direction to <html>
      synchronously, so the browser's first paint already has the right theme.
    -->
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('nkhbat-app-settings');
          var theme = 'dark'; // Default
          var lang = 'ar';    // Default
          var dir = 'rtl';    // Default

          if (raw) {
            var state = JSON.parse(raw).state || {};
            if (state.theme) theme = state.theme;
            if (state.language) lang = state.language;
            dir = lang === 'en' ? 'ltr' : 'rtl';
          }

          // Symmetrically apply dark mode class
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }

          // Apply language direction
          document.documentElement.lang = lang;
          document.documentElement.dir = dir;
        } catch (e) {
          // If localStorage is corrupt, fallback silently to default dark theme
          document.documentElement.classList.add('dark');
          document.documentElement.lang = 'ar';
          document.documentElement.dir = 'rtl';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
